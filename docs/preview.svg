<svg xmlns="http://www.w3.org/2000/svg" width="940" height="560" viewBox="0 0 940 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="940" height="560" rx="12" fill="#0F141C"/>

  <!-- Top bar -->
  <g transform="translate(20,18)">
    <rect x="0" y="0" width="26" height="26" rx="6" fill="url(#logo)"/>
    <rect x="6" y="15" width="3.4" height="6" fill="#fff"/><rect x="11" y="11" width="3.4" height="10" fill="#fff"/><rect x="16" y="7" width="3.4" height="14" fill="#fff"/>
    <text x="36" y="18" fill="#F3F6FB" font-size="16" font-weight="bold">NetUsage Monitor</text>

    <rect x="250" y="2" width="220" height="24" rx="6" fill="#141B26" stroke="#2A3441"/>
    <text x="262" y="18" fill="#9AA6B5" font-size="12">Search apps…</text>

    <rect x="560" y="0" width="150" height="28" rx="6" fill="#1A2230"/>
    <text x="572" y="19" fill="#10B981" font-size="13" font-weight="bold">↓</text>
    <text x="584" y="19" fill="#F3F6FB" font-size="12" font-family="Consolas, monospace">4.21 MB/s</text>
    <text x="660" y="19" fill="#3B82F6" font-size="13" font-weight="bold">↑</text>
    <text x="672" y="19" fill="#F3F6FB" font-size="12" font-family="Consolas, monospace">88 KB/s</text>

    <rect x="720" y="0" width="110" height="28" rx="6" fill="#1A2230" stroke="#2A3441"/>
    <circle cx="734" cy="14" r="4.5" fill="#10B981"/>
    <text x="744" y="19" fill="#F3F6FB" font-size="12">Recording</text>

    <rect x="840" y="0" width="80" height="28" rx="6" fill="#1A2230" stroke="#2A3441"/>
    <text x="852" y="19" fill="#F3F6FB" font-size="12">⚙ Settings</text>
  </g>

  <!-- Apps table -->
  <g transform="translate(20,64)">
    <rect x="0" y="0" width="580" height="450" rx="8" fill="#141B26"/>
    <!-- header -->
    <text x="14" y="24" fill="#9AA6B5" font-size="11" font-weight="bold">APPLICATION</text>
    <text x="320" y="24" fill="#9AA6B5" font-size="11" font-weight="bold">↓ RATE</text>
    <text x="400" y="24" fill="#9AA6B5" font-size="11" font-weight="bold">↑ RATE</text>
    <text x="475" y="24" fill="#9AA6B5" font-size="11" font-weight="bold">↓ HOUR</text>
    <line x1="0" y1="34" x2="580" y2="34" stroke="#2A3441"/>

    <!-- rows -->
    <g font-size="13" fill="#F3F6FB">
      <!-- row template: icon, name, down, up, hour -->
      <g transform="translate(0,34)">
        <rect x="0" y="0" width="580" height="34" fill="#1E3A5F"/>
        <circle cx="20" cy="17" r="8" fill="#ef4444"/>
        <text x="36" y="21">Google Chrome</text>
        <text x="320" y="21" font-family="Consolas, monospace" fill="#10B981">2.90 MB/s</text>
        <text x="400" y="21" font-family="Consolas, monospace" fill="#3B82F6">41 KB/s</text>
        <text x="475" y="21" font-family="Consolas, monospace">512 MB</text>
      </g>
      <g transform="translate(0,68)">
        <circle cx="20" cy="17" r="8" fill="#1b2838"/>
        <text x="36" y="21">Steam</text>
        <text x="320" y="21" font-family="Consolas, monospace" fill="#10B981">1.10 MB/s</text>
        <text x="400" y="21" font-family="Consolas, monospace" fill="#3B82F6">12 KB/s</text>
        <text x="475" y="21" font-family="Consolas, monospace">1.40 GB</text>
      </g>
      <g transform="translate(0,102)">
        <rect x="0" y="0" width="580" height="34" fill="#15202E"/>
        <circle cx="20" cy="17" r="8" fill="#1db954"/>
        <text x="36" y="21">Spotify</text>
        <text x="320" y="21" font-family="Consolas, monospace" fill="#10B981">160 KB/s</text>
        <text x="400" y="21" font-family="Consolas, monospace" fill="#3B82F6">3 KB/s</text>
        <text x="475" y="21" font-family="Consolas, monospace">88 MB</text>
      </g>
      <g transform="translate(0,136)">
        <circle cx="20" cy="17" r="8" fill="#6b7280"/>
        <text x="36" y="21">Service Host (svchost)</text>
        <text x="320" y="21" font-family="Consolas, monospace" fill="#10B981">44 KB/s</text>
        <text x="400" y="21" font-family="Consolas, monospace" fill="#3B82F6">9 KB/s</text>
        <text x="475" y="21" font-family="Consolas, monospace">22 MB</text>
      </g>
      <g transform="translate(0,170)" opacity="0.45">
        <rect x="0" y="0" width="580" height="34" fill="#15202E"/>
        <circle cx="20" cy="17" r="8" fill="#8b5cf6"/>
        <text x="36" y="21">Discord  (ignored)</text>
        <text x="320" y="21" font-family="Consolas, monospace">—</text>
        <text x="400" y="21" font-family="Consolas, monospace">—</text>
        <text x="475" y="21" font-family="Consolas, monospace">—</text>
      </g>
      <g transform="translate(0,204)">
        <circle cx="20" cy="17" r="8" fill="#f59e0b"/>
        <text x="36" y="21">OneDrive</text>
        <text x="320" y="21" font-family="Consolas, monospace" fill="#10B981">9 KB/s</text>
        <text x="400" y="21" font-family="Consolas, monospace" fill="#3B82F6">21 KB/s</text>
        <text x="475" y="21" font-family="Consolas, monospace">140 MB</text>
      </g>
    </g>
  </g>

  <!-- Detail panel -->
  <g transform="translate(620,64)">
    <rect x="0" y="0" width="300" height="450" rx="8" fill="#141B26"/>
    <circle cx="28" cy="30" r="13" fill="#ef4444"/>
    <text x="50" y="35" fill="#F3F6FB" font-size="15" font-weight="bold">Google Chrome</text>
    <text x="16" y="58" fill="#9AA6B5" font-size="10">C:\Program Files\Google\Chrome\chrome.exe</text>

    <!-- chart -->
    <rect x="16" y="72" width="268" height="110" rx="4" fill="#0F141C"/>
    <path d="M16,150 L60,120 L100,135 L140,95 L180,110 L220,80 L284,100 L284,182 L16,182 Z" fill="url(#area)" stroke="#10b981" stroke-width="1.5"/>
    <polyline points="16,170 60,165 100,168 140,160 180,166 220,158 284,162" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="22" y="86" fill="#9AA6B5" font-size="9">peak 6.2 MB</text>
    <text x="22" y="178" fill="#9AA6B5" font-size="9">-60 min</text>
    <text x="258" y="178" fill="#9AA6B5" font-size="9">now</text>

    <g font-size="11">
      <text x="16" y="208" fill="#9AA6B5">Live download</text>
      <text x="160" y="208" fill="#9AA6B5">Live upload</text>
      <text x="16" y="226" fill="#10B981" font-size="14" font-weight="bold">2.90 MB/s</text>
      <text x="160" y="226" fill="#3B82F6" font-size="14" font-weight="bold">41 KB/s</text>

      <text x="16" y="256" fill="#9AA6B5">Last hour ↓</text>
      <text x="160" y="256" fill="#9AA6B5">Last hour ↑</text>
      <text x="16" y="274" fill="#F3F6FB" font-size="14" font-weight="bold">512 MB</text>
      <text x="160" y="274" fill="#F3F6FB" font-size="14" font-weight="bold">18 MB</text>

      <text x="16" y="304" fill="#9AA6B5">Total recorded</text>
      <text x="16" y="322" fill="#F3F6FB" font-size="14" font-weight="bold">7.8 GB</text>
    </g>
  </g>

  <!-- status bar -->
  <g transform="translate(20,524)">
    <rect x="0" y="0" width="900" height="24" rx="6" fill="#141B26"/>
    <text x="12" y="16" fill="#9AA6B5" font-size="11">28 apps   ·   Keeping last 60 min · 2 kept forever   ·   Tracking: all apps   ·   Records: 41 MB</text>
  </g>
</svg>
